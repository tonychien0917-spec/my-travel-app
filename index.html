<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室飲品點購系統 - 雲端圖片版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --bg: #f4f7f6; --success: #00b894; --accent: #fdcb6e; --edit: #0984e3; --danger: #d63031; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg); padding: 10px; color: #2d3436; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* 標題區 */
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .header h2 { display: inline-block; margin: 0; }

        /* 雲端上傳區 */
        .upload-section { background: #f0f0ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed var(--primary); text-align: center; }
        .url-display { margin-top: 10px; display: flex; gap: 5px; justify-content: center; }
        .url-display input { width: 70%; height: 35px; background: #eee; border: 1px solid #ccc; border-radius: 4px; padding: 0 10px; font-size: 12px; }
        
        .btn-upload-cloud { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .loading-spinner { display: none; color: var(--primary); font-weight: bold; }

        /* 圖片預覽 */
        .menu-preview-container { text-align: center; margin-bottom: 20px; background: #fff; border-radius: 10px; padding: 10px; display: none; border: 1px solid #ddd; position: relative; }
        #menuPreview { max-width: 100%; max-height: 400px; border-radius: 5px; }

        /* 聯繫資訊與表單 (維持原樣) */
        .contact-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #fff9eb; padding: 15px; border-radius: 8px; border: 1px solid var(--accent); }
        .order-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.85em; font-weight: bold; color: #636e72; margin-bottom: 5px; }
        input, select { padding: 8px 12px; border: 1px solid #dfe6e9; border-radius: 6px; font-size: 14px; height: 42px; box-sizing: border-box; }

        /* 統計表 */
        .stats-area { margin-top: 30px; background: white; padding: 10px; border-radius: 8px; }
        .stats-header-info { display: none; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .total-row { background: #dfe6e9; font-weight: bold; }
        
        .btn-del { color: var(--danger); cursor: pointer; border: none; background: none; font-size: 1.2em; }
        .btn-edit { color: var(--edit); cursor: pointer; border: none; background: none; font-weight: bold; }
        .btn-export { background: #0984e3; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; }
        .btn-clear-all { background: #fab1a0; color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>辦公室飲品點購系統<span style="font-size: 0.5em; color: #888; margin-left: 10px;">☁️ 雲端自動圖床版</span></h2>
    </div>

    <div class="upload-section">
        <label style="display: block; margin-bottom: 10px; font-weight: bold; color: var(--primary);">📸 第一步：上傳菜單圖片 (自動生成永久網址)</label>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="uploadToImgur(this)">
        <button class="btn-upload-cloud" onclick="document.getElementById('fileInput').click()">選擇菜單檔案並上傳</button>
        <span id="uploadStatus" class="loading-spinner">⏳ 上傳雲端中...</span>
        
        <div class="url-display" id="urlDisplayArea" style="display: none;">
            <input type="text" id="generatedUrl" readonly>
            <button onclick="copyUrl()" style="cursor: pointer;">📋 複製網址</button>
        </div>
        <small style="display: block; margin-top: 5px; color: #666;">*圖片將儲存於雲端，同事開啟連結皆可看到菜單。</small>
    </div>

    <div class="menu-preview-container" id="previewBox">
        <img id="menuPreview" src="" alt="菜單預覽">
    </div>

    <div class="contact-info">
        <div class="field"><label>聯繫人</label><input type="text" id="contactName" placeholder="王小明"></div>
        <div class="field"><label>電話</label><input type="tel" id="contactTel" placeholder="0912-345-678"></div>
        <div class="field" style="grid-column: span 2;"><label>地址</label><input type="text" id="contactAddr" placeholder="送餐地址..."></div>
    </div>

    <div class="order-form">
        <div class="field"><label>訂購人</label><input type="text" id="uName"></div>
        <div class="field"><label>飲品</label><input type="text" id="dName"></div>
        <div class="field"><label>糖度</label><select id="sugar"><option>無糖</option><option>微糖</option><option>半糖</option><option>少糖</option><option>全糖</option></select></div>
        <div class="field"><label>冰塊</label><select id="ice"><option>去冰</option><option>微冰</option><option>半冰</option><option>少冰</option><option>正常</option></select></div>
        <div class="field"><label>單價</label><input type="number" id="price" value="0" oninput="calculateRowTotal()"></div>
        <div class="field"><label>數量</label><input type="number" id="qty" value="1" oninput="calculateRowTotal()"></div>
        <div class="field" style="grid-column: 1 / -1;"><label>備註</label><input type="text" id="note"></div>
        <div class="price-auto-hint">💰 小計：<span id="rowTotal">0</span> 元</div>
        <button class="btn-add" id="btnAddOrder" onclick="addOrder()">➕ 加入統計清單</button>
    </div>

    <div id="captureArea" class="stats-area">
        <div id="statsHeaderInfo" class="stats-header-info">
            <h2 style="color:var(--primary);">🥤 飲品訂購清單</h2>
            <p id="outContact"></p><p id="outTel"></p><p id="outAddr"></p>
        </div>
        <div style="overflow: hidden; margin-bottom: 10px;">
            <h3 style="display: inline-block; margin: 0;">📊 訂單統計表</h3>
            <button class="btn-clear-all" onclick="clearAllOrders()">🗑️ 清空統計表</button>
        </div>
        <table id="mainTable">
            <thead>
                <tr><th>姓名</th><th>飲品</th><th>糖冰</th><th>單價</th><th>數量</th><th>總計</th><th>備註</th><th>操作</th></tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="5" style="text-align: right;">總金額：</td>
                    <td id="grandTotal" style="color:#d63031;">0</td>
                    <td colspan="2">元</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <button class="btn-export" onclick="saveImg()">📸 匯出統計表圖片</button>
</div>

<script>
    // --- 關鍵功能：上傳圖片到 Imgur ---
    async function uploadToImgur(input) {
        if (!input.files || !input.files[0]) return;
        
        const status = document.getElementById('uploadStatus');
        const urlArea = document.getElementById('urlDisplayArea');
        const urlInput = document.getElementById('generatedUrl');
        const previewBox = document.getElementById('previewBox');
        const previewImg = document.getElementById('menuPreview');

        status.style.display = 'inline';
        
        const formData = new FormData();
        formData.append('image', input.files[0]);

        try {
            // 使用 Imgur 匿名上傳 API
            const response = await fetch('https://api.imgur.com/3/image', {
                method: 'POST',
                headers: {
                    Authorization: 'Client-ID 546c25a59c58ad7' // 這是測試用的 Client ID
                },
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                const imageUrl = result.data.link;
                urlInput.value = imageUrl;
                previewImg.src = imageUrl;
                
                status.style.display = 'none';
                urlArea.style.display = 'flex';
                previewBox.style.display = 'block';
                alert("雲端上傳成功！圖片網址已生成。");
            } else {
                throw new Error('上傳失敗');
            }
        } catch (error) {
            console.error(error);
            alert("雲端上傳發生錯誤，請稍後再試。");
            status.style.display = 'none';
        }
    }

    function copyUrl() {
        const copyText = document.getElementById("generatedUrl");
        copyText.select();
        document.execCommand("copy");
        alert("網址已複製到剪貼簿！");
    }

    // --- 基礎點餐邏輯 ---
    let editingRow = null;

    function calculateRowTotal() {
        const p = parseInt(document.getElementById('price').value) || 0;
        const q = parseInt(document.getElementById('qty').value) || 0;
        document.getElementById('rowTotal').innerText = p * q;
    }

    function addOrder() {
        const data = {
            uName: document.getElementById('uName').value || "同事",
            dName: document.getElementById('dName').value || "飲品",
            sugarIce: `${document.getElementById('sugar').value}/${document.getElementById('ice').value}`,
            price: parseInt(document.getElementById('price').value) || 0,
            qty: parseInt(document.getElementById('qty').value) || 1,
            note: document.getElementById('note').value || "-",
        };
        const total = data.price * data.qty;
        const tbody = document.querySelector('#mainTable tbody');

        if (editingRow) {
            renderRow(editingRow, data, total);
            editingRow = null;
            document.getElementById('btnAddOrder').innerText = "➕ 加入統計清單";
            document.getElementById('btnAddOrder').style.background = "var(--success)";
        } else {
            renderRow(tbody.insertRow(), data, total);
        }
        updateTotal(); clearForm();
    }

    function renderRow(row, data, total) {
        row.innerHTML = `
            <td>${data.uName}</td><td>${data.dName}</td><td>${data.sugarIce}</td>
            <td>${data.price}</td><td>${data.qty}</td><td><b>${total}</b></td><td>${data.note}</td>
            <td>
                <span class="btn-edit" onclick="editRow(this.parentElement.parentElement)" style="cursor:pointer;color:blue;">修改</span> | 
                <span class="btn-del" onclick="this.parentElement.parentElement.remove(); updateTotal();" style="cursor:pointer;">❌</span>
            </td>
        `;
    }

    function editRow(row) {
        editingRow = row;
        const cells = row.cells;
        document.getElementById('uName').value = cells[0].innerText;
        document.getElementById('dName').value = cells[1].innerText;
        document.getElementById('price').value = cells[3].innerText;
        document.getElementById('qty').value = cells[4].innerText;
        document.getElementById('note').value = cells[6].innerText;
        calculateRowTotal();
        document.getElementById('btnAddOrder').innerText = "💾 儲存修改";
        document.getElementById('btnAddOrder').style.background = "var(--edit)";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearForm() {
        document.getElementById('uName').value = ""; document.getElementById('dName').value = "";
        document.getElementById('note').value = ""; document.getElementById('price').value = 0;
        calculateRowTotal();
    }

    function updateTotal() {
        let sum = 0;
        document.querySelectorAll('#mainTable tbody tr').forEach(tr => sum += parseInt(tr.cells[5].innerText));
        document.getElementById('grandTotal').innerText = sum;
    }

    function clearAllOrders() {
        if(confirm("確定要清空嗎？")) { document.querySelector('#mainTable tbody').innerHTML = ""; updateTotal(); }
    }

    function saveImg() {
        document.getElementById('outContact').innerText = "聯繫人：" + document.getElementById('contactName').value;
        document.getElementById('outTel').innerText = "電話：" + document.getElementById('contactTel').value;
        document.getElementById('outAddr').innerText = "地址：" + document.getElementById('contactAddr').value;
        
        const info = document.getElementById('statsHeaderInfo');
        const actionCols = document.querySelectorAll('th:last-child, td:last-child');
        
        info.style.display = "block";
        actionCols.forEach(el => el.style.display = "none");

        html2canvas(document.querySelector("#captureArea"), { scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = `飲料訂單.png`;
            link.href = canvas.toDataURL();
            link.click();
            info.style.display = "none";
            actionCols.forEach(el => el.style.display = "");
        });
    }
</script>
</body>
</html>
