<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧旅遊規劃師 2.5 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
        .loading-animation {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-indigo-600 to-blue-700 p-8 text-white text-center">
            <h1 class="text-2xl font-black tracking-tight">智慧旅遊規劃師 2.5</h1>
            <p class="text-blue-100 text-xs mt-1">天數、人數、預算，一鍵搞定</p>
        </div>

        <div class="p-7 space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">📍 目的地</label>
                <input type="text" id="location" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 text-lg focus:border-indigo-500 outline-none transition-all" placeholder="例如：台南、東京">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">📅 天數</label>
                <select id="days" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-indigo-500 text-gray-700 text-sm">
                    <option value="1天">1天 (當日來回)</option>
                    <option value="2天1夜" selected>2天1夜 (週末快閃)</option>
                    <option value="3天2夜">3天2夜 (深度旅遊)</option>
                    <option value="4天3夜">4天3夜 (悠閒漫遊)</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">👥 人數</label>
                    <select id="people" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-indigo-500 text-gray-700 text-sm">
                        <option value="1人獨旅">1人獨旅</option>
                        <option value="2人世界">2人世界</option>
                        <option value="3-4人好友">3-4人好友</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">💰 預算</label>
                    <select id="budget" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-indigo-500 text-gray-700 text-sm">
                        <option value="省錢窮遊">省錢窮遊</option>
                        <option value="一般平價">一般平價</option>
                        <option value="稍微奢侈">稍微奢侈</option>
                    </select>
                </div>
            </div>

            <button onclick="generateTrip()" id="mainBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-3">
                <span id="loader" class="loading-animation hidden"></span>
                <span id="btnText">開始規劃 ✨</span>
            </button>

            <div id="resultBox" class="hidden mt-4">
                <div id="result" class="text-gray-700 text-sm bg-indigo-50/50 rounded-2xl p-5 border border-indigo-100 overflow-y-auto max-h-[300px]"></div>
                
                <button onclick="shareToLine()" class="mt-4 w-full bg-[#06C755] hover:bg-[#05a346] text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2 transition-all">
                    <span>分享到 LINE 給旅伴</span>
                </button>
            </div>

            <div id="errorBox" class="hidden mt-2 p-2 bg-red-50 text-red-500 text-[10px] rounded-lg border border-red-100 font-mono break-all"></div>
        </div>
    </div>

    <script>
        const _KEY = "AIzaSyCqy-mQvj-DucRkhDBoAUk86NuJWHtpzKg";
        let currentTripPlan = ""; // 用來存儲純文字行程

        async function generateTrip() {
            const loc = document.getElementById('location').value.trim();
            const days = document.getElementById('days').value;
            const people = document.getElementById('people').value;
            const budget = document.getElementById('budget').value;
            const resultBox = document.getElementById('resultBox');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');

            if (!loc) { alert("請輸入目的地！"); return; }

            resultBox.classList.add('hidden');
            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${_KEY}`;
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `請擔任專業導遊，規劃 ${loc} 的 ${days} 旅遊行程，人數 ${people}，預算 ${budget}。請用繁體中文回覆，包含每日行程與美食建議，並多用 Emoji。` }] }]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                currentTripPlan = data.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = currentTripPlan.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
                resultBox.classList.remove('hidden');
            } catch (err) {
                alert("錯誤：" + err.message);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        // LINE 分享功能
        function shareToLine() {
            if (!currentTripPlan) return;
            const message = encodeURIComponent(`🧳 嘿！這是我用 AI 規劃的行程：\n\n${currentTripPlan}`);
            window.location.href = `https://line.me/R/share?text=${message}`;
        }
    </script>
</body>
</html>
